<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <title>ART HYPERX X</title>
  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #E6E6E6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ----- HEADER ----- */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: white;
      border-bottom: 1px solid #ddd;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h2 {
      font-weight: 700;
      letter-spacing: 1px;
      color: #111;
    }
    header button {
      background: black;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.2s;
    }
    header button i {
      font-size: 1rem;
    }
    header button:hover {
      background: #333;
    }

    /* ----- SIDEBAR (corrected & enhanced) ----- */
    .sidebar {
      position: fixed;
      top: 0;
      left: -320px;
      width: 280px;
      height: 100vh;
      background: rgba(10, 25, 47, 0.98);
      backdrop-filter: blur(20px);
      z-index: 1000;
      transition: left 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 8px 0 32px rgba(0, 0, 0, 0.2);
      padding: 2rem 1rem;
      border-radius: 0 24px 24px 0;
      display: flex;
      flex-direction: column;
      color: white;
    }

    .sidebar.open {
      left: 0;
    }

    .close-sidebar {
      position: absolute;
      top: 1rem;
      right: 1.2rem;
      background: none;
      border: none;
      color: white;
      font-size: 1.8rem;
      cursor: pointer;
      opacity: 0.8;
      transition: 0.2s;
    }
    .close-sidebar:hover {
      opacity: 1;
      transform: scale(1.1);
    }

    .sidebar-item {
      background: rgba(255, 255, 255, 0.08);
      margin: 1rem 0;
      padding: 1rem 1.2rem;
      border-radius: 60px;
      color: white;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      word-break: break-word;
    }

    .sidebar-item i {
      font-size: 1.2rem;
      width: 28px;
      text-align: center;
    }

    .sidebar-item:hover {
      background: #FF6B4A;
      transform: translateX(8px);
      border-color: transparent;
    }

    /* profile image inside sidebar */
    #profilePhoto {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 0.5rem;
      border: 2px solid rgba(255,255,255,0.5);
      background: #2a2a4a;
    }

    .google-signin-btn {
      background: white;
      color: #111;
      border: none;
      padding: 12px 16px;
      border-radius: 40px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 1rem 0 1.2rem;
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
      font-size: 0.95rem;
      border: 1px solid #ccc;
    }
    .google-signin-btn:hover {
      background: #f0f0f0;
    }

    /* overlay */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(3px);
      z-index: 999;
      opacity: 0;
      visibility: hidden;
      transition: 0.25s;
    }
    .overlay.active {
      opacity: 1;
      visibility: visible;
    }

    /* ----- MAIN CONTENT ----- */
    .home {
      background: #FFFFFF;
      padding: 24px;
      margin: 16px 12px;
      border-radius: 28px;
      max-width: 700px;
      width: calc(100% - 24px);
      align-self: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    .home u h2 {
      font-weight: 700;
      font-size: 1.6rem;
      margin-bottom: 6px;
    }
    hr {
      margin: 18px 0 14px;
      border: 0.5px solid #ddd;
    }

    .home p {
      font-weight: 600;
      margin: 14px 0 6px;
      color: #222;
    }

    input[type="file"] {
      padding: 10px;
      border: 2px dashed #000000;
      border-radius: 14px;
      width: 100%;
      background: #fafafa;
      cursor: pointer;
    }
    input::-webkit-file-upload-button {
      background: black;
      padding: 10px 18px;
      color: white;
      font-weight: 700;
      border-radius: 30px;
      border: none;
      margin-right: 12px;
      cursor: pointer;
      transition: 0.2s;
    }
    input::-webkit-file-upload-button:hover {
      background: #333;
    }

    textarea {
      width: 100%;
      padding: 14px;
      border: 2px dashed #aaa;
      border-radius: 18px;
      font-size: 0.95rem;
      resize: vertical;
      background: #fdfdfd;
      margin-top: 6px;
    }

    #feed {
      background: #f8f8f8;
      border-radius: 20px;
      padding: 12px;
      min-height: 100px;
      margin-top: 8px;
      color: #444;
      font-style: italic;
    }

    button:active {
      transform: scale(0.96);
    }

    /* responsive touch */
    @media (max-width: 480px) {
      .home {
        margin: 10px 6px;
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h2>ARTYX</h2>
    <button id="menuToggleBtn"><i class="fas fa-bars"></i> menu</button>
  </header>

  <!-- CORRECTED SIDEBAR (class renamed to sidebar, fixed structure) -->
  <aside class="sidebar" id="sidePanel">
    <button class="close-sidebar" id="closeSidebarBtn"><i class="fas fa-times"></i></button>
    
    <button id="googleSignBtn" class="google-signin-btn">
      <i class="fab fa-google"></i> Sign In With Google
    </button>
    
    <img id="profilePhoto" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="profile avatar" style="display:block; margin:0 auto 0.2rem; width:70px; height:70px; border-radius:50%; object-fit:cover; background:#ccc;" />
    
    <div id="displayName" class="sidebar-item">
      <i class="fas fa-user-circle"></i> <span id="nameText">Guest</span>
    </div>
    <div id="displayEmail" class="sidebar-item">
      <i class="fas fa-envelope"></i> <span id="emailText">not signed in</span>
    </div>
    <div style="flex:1;"></div>
    <div class="sidebar-item" style="margin-top:auto; opacity:0.7;">
      <i class="fas fa-palette"></i> Art HyperX
    </div>
  </aside>

  <div class="overlay" id="overlay"></div>

  <br />
  <div class="home">
    <u><h2>Home & Uploads</h2></u>
    <hr />
    <p>📷 Upload Image</p>
    <input type="file" id="filesUpload" accept="image/*">
    <p>✍️ Caption</p>
    <textarea id="caption" rows="5" cols="40" placeholder="Your description..."></textarea>
    <hr />
    <h3>🌿 Feeds</h3>
    <div id="feed">
      <i class="fas fa-image"></i> Your art gallery appears here...
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script>
    (function() {
      // ----- SIDEBAR TOGGLE LOGIC (corrected functionality) -----
      const sidebar = document.getElementById('sidePanel');
      const overlay = document.getElementById('overlay');
      const menuBtn = document.getElementById('menuToggleBtn');
      const closeBtn = document.getElementById('closeSidebarBtn');

      function openSidebar() {
        sidebar.classList.add('open');
        overlay.classList.add('active');
      }

      function closeSidebar() {
        sidebar.classList.remove('open');
        overlay.classList.remove('active');
      }

      if (menuBtn) {
        menuBtn.addEventListener('click', openSidebar);
      }
      if (closeBtn) {
        closeBtn.addEventListener('click', closeSidebar);
      }
      if (overlay) {
        overlay.addEventListener('click', closeSidebar);
      }

      // ----- FIREBASE CONFIG (placeholder – replace with your own config) -----
      const firebaseConfig = {
           apiKey: "AIzaSyA-OyDUzcmweGczSVqkDssXEblGF7YG4Ys",
  authDomain: "ian-tech.firebaseapp.com",
  projectId: "ian-tech",
  storageBucket: "ian-tech.firebasestorage.app",
  messagingSenderId: "103669714993",
  appId: "1:103669714993:web:14f6c97d5555993addc510",
  measurementId: "G-RL880V5HQ4"
      };

      // Initialize Firebase (safe check)
      try {
        firebase.initializeApp(firebaseConfig);
        console.log("Firebase initialized (demo mode). Replace config for real usage.");
      } catch (e) {
        console.warn("Firebase init error or already initialized:", e.message);
      }

      const auth = firebase.auth();
      const db = firebase.firestore();

      // ----- UI ELEMENTS for auth -----
      const googleSignBtn = document.getElementById('googleSignBtn');
      const profilePhoto = document.getElementById('profilePhoto');
      const nameText = document.getElementById('nameText');
      const emailText = document.getElementById('emailText');
      const feedDiv = document.getElementById('feed');

      // Default avatar
      const defaultAvatar = 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

      // Update sidebar UI with user data
      function updateUserUI(user) {
        if (user) {
          const displayName = user.displayName || 'Artist';
          const email = user.email || 'no email';
          const photoURL = user.photoURL || defaultAvatar;
          
          if (nameText) nameText.textContent = displayName;
          if (emailText) emailText.textContent = email;
          if (profilePhoto) {
            profilePhoto.src = photoURL;
            profilePhoto.alt = displayName;
          }
          // change button text
          if (googleSignBtn) {
            googleSignBtn.innerHTML = '<i class="fas fa-sign-out-alt"></i> Sign Out';
          }
        } else {
          if (nameText) nameText.textContent = 'Guest';
          if (emailText) emailText.textContent = 'not signed in';
          if (profilePhoto) profilePhoto.src = defaultAvatar;
          if (googleSignBtn) {
            googleSignBtn.innerHTML = '<i class="fab fa-google"></i> Sign In With Google';
          }
        }
      }

      // Google Sign-In / Sign-Out handler
      async function handleGoogleAuth() {
        const currentUser = auth.currentUser;
        if (currentUser) {
          // Sign out
          try {
            await auth.signOut();
            updateUserUI(null);
            if (feedDiv) feedDiv.innerHTML = '<i class="fas fa-info-circle"></i> Signed out. Sign in to see feeds.';
          } catch (err) {
            alert('Sign out error: ' + err.message);
          }
          return;
        }

        // Sign in with Google
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
          const result = await auth.signInWithPopup(provider);
          updateUserUI(result.user);
          if (feedDiv) feedDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Loading art feeds...';
          // Optionally load some demo feeds from Firestore
          loadFeeds();
        } catch (error) {
          console.error("Google sign-in error:", error);
          alert("Sign-in failed: " + (error.message || "Please check pop-up blocker or config."));
          // Fallback: still show guest UI
        }
      }

      if (googleSignBtn) {
        googleSignBtn.addEventListener('click', handleGoogleAuth);
      }

      // Auth state listener
      auth.onAuthStateChanged((user) => {
        updateUserUI(user);
        if (user) {
          console.log("User signed in:", user.email);
          loadFeeds();
        } else {
          if (feedDiv) feedDiv.innerHTML = '<i class="fas fa-lock"></i> Sign in to explore art feeds.';
        }
      });

      // Simple feed loader (demo / Firestore)
      async function loadFeeds() {
        if (!feedDiv) return;
        try {
          // Try to get recent uploads from Firestore (collection 'posts')
          const snapshot = await db.collection('posts').orderBy('timestamp', 'desc').limit(8).get();
          if (snapshot.empty) {
            feedDiv.innerHTML = '<i class="far fa-image"></i> No art yet. Be the first to upload!';
            return;
          }
          let html = '';
          snapshot.forEach(doc => {
            const data = doc.data();
            const caption = data.caption || 'Untitled';
            const imageUrl = data.imageUrl || '';
            html += `
              <div style="background:white; border-radius:16px; padding:12px; margin-bottom:12px; display:flex; gap:12px; align-items:center;">
                <div style="width:60px; height:60px; background:#ddd; border-radius:12px; overflow:hidden; flex-shrink:0;">
                  ${imageUrl ? `<img src="${imageUrl}" style="width:100%; height:100%; object-fit:cover;" alt="art"/>` : '<i class="fas fa-image" style="padding:18px;"></i>'}
                </div>
                <div><strong>${escapeHtml(caption)}</strong><br><small style="color:#666;">by ${escapeHtml(data.userName || 'artist')}</small></div>
              </div>`;
          });
          feedDiv.innerHTML = html;
        } catch (err) {
          console.warn("Feed load error (maybe missing permissions):", err.message);
          feedDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Demo mode: connect Firestore to see real art.';
        }
      }

      function escapeHtml(text) {
        return String(text).replace(/[&<>"]/g, function(m) {
          if (m === '&') return '&amp;';
          if (m === '<') return '&lt;';
          if (m === '>') return '&gt;';
          if (m === '"') return '&quot;';
          return m;
        });
      }

      // Upload demonstration (mock / real upload to Firestore)
      const fileInput = document.getElementById('filesUpload');
      const captionInput = document.getElementById('caption');

      if (fileInput) {
        fileInput.addEventListener('change', async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          
          const user = auth.currentUser;
          if (!user) {
            alert('Please sign in with Google to upload art.');
            fileInput.value = ''; 
            return;
          }

          // In a real app, upload to Cloud Storage and save to Firestore.
          // Here we simulate a demo post.
          const caption = captionInput?.value.trim() || 'Untitled Art';
          const dummyImageUrl = 'https://placehold.co/200x200/FF6B4A/white?text=Art+Upload';
          
          try {
            await db.collection('posts').add({
              userId: user.uid,
              userName: user.displayName || 'Artist',
              caption: caption,
              imageUrl: dummyImageUrl, // replace with real uploaded URL
              timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            if (feedDiv) feedDiv.innerHTML = '<i class="fas fa-check-circle"></i> Art shared! Refreshing...';
            if (captionInput) captionInput.value = '';
            fileInput.value = '';
            setTimeout(() => loadFeeds(), 800);
          } catch (err) {
            alert('Upload failed: ' + err.message);
            console.error(err);
          }
        });
      }

      // initial feed load if user already signed in
      setTimeout(() => {
        if (auth.currentUser) {
          loadFeeds();
        }
      }, 400);
    })();
  </script>
</body>
</html>
